<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar</title>
    <style>
        #progress{
            width: 250px;
            height: 20px;
            border: 2px solid black;
            border-radius: 10px;
        }
        #bar{
            height: 100%;
            border-radius: 10px;
            background-color: aqua;
            animation: hob 4s ease-in-out 0s 4 normal;
            
            
        }
        @keyframes hob{
            0%{width: 0%;}
            50%{ width: 50%;}
            80%{ width: 20%;}
            100%{width: 100%;}
        }
    </style>
</head>
<body>
    <div id="progress">
        <div id="bar">
        </div>
    </div>
</body>
</html>
