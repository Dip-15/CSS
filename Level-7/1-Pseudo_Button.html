<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Button</title>
    <style>
        .Button{
            height: 25px;
            width: 150px;
            background-color: rgba(159, 159, 139, 0.288);
            border: 2px solid black;
            border-radius: 5px; 
        }
        .Button:hover{
            height: 30px;
            width: 160px;
            background-color: aqua;
             
        }
        .Button:active{
            background-color: hotpink ;
        }
    </style>
</head>
<body>
    <main>
        <button class="Button">Click Me</button>
    </main>
</body>
</html>
