<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .Animation{
            width: 100px;
            height: 100px;
            margin: 30px;
            border: 3px solid;
            border-radius: 10px;
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top: 40px;
            left: 40px;
            /* animation-name: chalja;
            animation-duration: 3s;
            animation-timing-function: ease-in-out;
            animation-delay: 1s;
            animation-iteration-count: 4;
            animation-direction: alternate; */
            animation: chalja 3s ease-in-out 1s 4  alternate;
             
        }
        @keyframes chalja {
            from{left: 40px}
            to{left: 500px;}
        }
    </style>
</head>
<body>
    <main>
        <div class="Animation">Animation</div>
    </main>
</body>
</html>
