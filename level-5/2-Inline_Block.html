<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Block</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .Box{
            background-color: aqua;
            width: 100px;
            height: 100px;
            margin: 10px;
            text-align: center;
            border: 5px solid;
            padding-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="Box">Box1</div>
    <div class="Box">Box1</div>
    <div class="Box">Box1</div>
 
</body>
</html>
