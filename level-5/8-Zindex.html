<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #first,#Second{
            position: absolute;
            background-color: aqua;
            border: 5px solid ;
            text-align: center;
            font-size: 20px;
        }
         #first{
            width: 80px;
            height: 80px;
            z-index: 2;
         }
         #Second{
            width: 100px;
            height: 100px;
            top: 50px;
            left: 50px;
            z-index: 1;
         }
        
    </style>
    
</head>
<body>
    <div id="first">First</div>
    <div id="Second">Second</div>
</body>
</html>
