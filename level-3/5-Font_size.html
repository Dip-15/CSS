<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Size</title>
    <style>
        #f1{
            font-size: 25px;
        }
        #f2{
            font-size: 35px;
        }
        #f3{
             font-size: 25px;
             font-weight: 900;
        }
        #f4{
             font-size: 35px;
             font-weight:900;
        }
    </style>
</head>
<body>
     <h1 id="f1">This is the text</h1><hr>
     <h1 id="f2">This is the text</h1><hr>
     <h1 id="f3">This is the text</h1><hr>
     <h1 id="f4">This is the text</h1>
</body>
</html>
