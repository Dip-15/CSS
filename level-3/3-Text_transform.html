 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform</title>
    <style>
        #f1{
            text-transform:lowercase;
        }
        #f2{
            text-transform:uppercase;
        }
        #f3{
            text-transform:capitalize ;
        }
        #f4{
            text-transform:none ;
        }
    </style>
</head>
    <body>
        <h1 id="f1">First Box</h1><br>
        <h1 id="f2">second box</h1><br>
        <h1 id="f3">third box</h1><br>
        <h1 id="f4">fourth box</h1><br>
    </body>
</html>
