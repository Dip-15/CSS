<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Decoration</title>
    <style>
        #f1{
            text-decoration:underline;
            text-decoration-style: dashed;
            text-decoration-color: red;
        }
        #f2{
            text-decoration:overline;
            text-decoration-style: double;
            text-decoration-color: blueviolet;
        }
        #f3{
            text-decoration:line-through;
            text-decoration-style: solid;
            text-decoration-color: yellowgreen;
        }
        #f4{
            text-decoration:underline;
            text-decoration-style: wavy;
            text-decoration-color:orange ;
        }
        #f5{
            text-decoration:underline;
            text-decoration-style: dotted;
            text-decoration-color:skyblue ;
        }
        #Ram{
              text-decoration: none;
        }
    </style>
</head>
<body>
    <h1 id="f1">This is my first text</h1><br>
    <h1 id="f2">This is my second text</h1><br>
    <h1 id="f3">This is my third text</h1><br>
    <h1 id="f4">This is my fourth text</h1><br>
    <h1 id="f5">This is my fourth text</h1>
    <a id="Ram" href="#Ram">RAM</a>
</body>
</html>
