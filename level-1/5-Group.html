<!DOCTYPE html>
<html lang="en">
<head>
    <title>Group selector</title>
    <style>
        #First,#Second,.Article{color:darkmagenta;}
    </style>
</head>
<body>
    <h1 id="First">This is the header</h1>
    <p class="Article">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Accusamus nesciunt adipisci aliquam praesentium officia illum voluptatem aut eos natus tenetur.</p>
    <h1 id="Second">This is the second heading</h1>

</body>
</html>
